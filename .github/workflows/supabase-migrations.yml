name: Supabase migrations

on:
  workflow_dispatch: {}
  push:
    branches:
      - feature/stage1-backend

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      PGSSLMODE: require
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret" >&2
            exit 1
          fi
          echo "SUPABASE_DB_URL found"

      - name: Resolve IPv4 for DB host (IPv4 fallback)
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils
          host=$(python -c "import os,urllib.parse;u=os.environ.get('SUPABASE_DB_URL','');print(urllib.parse.urlparse(u).hostname or '')")
          echo "Parsed host: $host"
          ipv4=$(dig +short A "$host" | head -n1)
          if [ -n "$ipv4" ]; then
            echo "Found IPv4: $ipv4"
            SUPABASE_DB_URL_IPV4=$(echo "$SUPABASE_DB_URL" | sed "s@$host@$ipv4@")
            echo "SUPABASE_DB_URL_IPV4=$SUPABASE_DB_URL_IPV4" >> $GITHUB_ENV
            echo "Using IPv4 for DB host in subsequent steps"
          else
            echo "No IPv4 A record found for $host; will use original SUPABASE_DB_URL"
          fi

      - name: Debug: DNS & connectivity
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          host=$(python -c "import os,urllib.parse;u=os.environ.get('SUPABASE_DB_URL','');print(urllib.parse.urlparse(u).hostname or '')")
          echo "Parsed host: $host"
          echo "dig A records for $host:"
          dig +short A "$host" || true
          echo "dig AAAA records for $host:"
          dig +short AAAA "$host" || true
          echo "SUPABASE_DB_URL_IPV4 (from GITHUB_ENV): $SUPABASE_DB_URL_IPV4"
          if [ -n "$SUPABASE_DB_URL_IPV4" ]; then
            ip=$(python -c "import os,urllib.parse;u=os.environ.get('SUPABASE_DB_URL_IPV4','');print(urllib.parse.urlparse(u).hostname or '')")
            echo "Testing TCP 5432 to $ip (timeout 5s)"
            if bash -c "timeout 5 bash -c '</dev/tcp/$ip/5432' 2>/dev/null"; then
              echo "TCP 5432 to $ip: open"
            else
              echo "TCP 5432 to $ip: closed/unreachable"
            fi
          else
            echo "No SUPABASE_DB_URL_IPV4 set; will use original SUPABASE_DB_URL host"
          fi

      - name: Backup remote DB (pg_dump)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DB_URL=${SUPABASE_DB_URL_IPV4:-$SUPABASE_DB_URL}
          mkdir -p backups
          timestamp=$(date +'%Y%m%d_%H%M%S')
          echo "Using DB URL: $DB_URL"
          echo "Running pg_dump -> backups/supabase_backup_${timestamp}.dump"
          pg_dump "$DB_URL" -Fc -f "backups/supabase_backup_${timestamp}.dump"
          ls -lh backups

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backups/*.dump

      - name: Run Supabase migrations (db push)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DB_URL=${SUPABASE_DB_URL_IPV4:-$SUPABASE_DB_URL}
          echo "Running supabase db push against: $DB_URL"
          npx --yes supabase db push --db-url "$DB_URL" --debug
